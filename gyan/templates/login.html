{% extends "base.html" %}

{% block title %}Login - GyaanShelf{% endblock %}

{% block content %}
<div class="container mx-auto px-8 py-12 min-h-[calc(100vh-80px)] flex items-center justify-center">
    <div class="max-w-md w-full bg-card rounded-[2rem] p-10 border border-border shadow-2xl animate-[fadeInScale_0.5s_ease-out]">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-accent/20">
                <i data-lucide="log-in" class="w-10 h-10 text-accent"></i>
            </div>
            <h2 class="text-3xl font-bold serif-title mb-2">Welcome Back</h2>
            <p class="text-text-muted text-sm">Sign in to your GyaanShelf account</p>
        </div>

        <form method="POST" class="space-y-5">
            
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black tracking-widest text-text-muted block">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted w-4 h-4"></i>
                    <input 
                        type="email" 
                        name="email"
                        placeholder="you@example.com" 
                        class="w-full pl-12 pr-4 py-4 rounded-2xl input-premium" 
                        required
                    >
                </div>
            </div>

            
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black tracking-widest text-text-muted block">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted w-4 h-4"></i>
                    <input 
                        type="password" 
                        name="password"
                        placeholder="Enter your password" 
                        class="w-full pl-12 pr-4 py-4 rounded-2xl input-premium" 
                        required
                    >
                </div>
            </div>

            
            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center gap-2 text-text-muted cursor-pointer">
                    <input type="checkbox" class="w-4 h-4" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="text-accent hover:text-accent/80 transition-colors">Forgot password?</a>
            </div>

            
            <button 
                type="submit" 
                class="btn-gold w-full py-4 rounded-2xl uppercase tracking-[0.15em] text-xs font-bold shadow-lg hover:shadow-xl mt-8 transition-all"
            >
                Sign In
            </button>

            
            <p class="text-center text-xs text-text-muted pt-4">
                Don't have an account? 
                <a href="{{ url_for('register') }}" class="text-accent hover:text-accent/80 font-bold transition-colors">
                    Register Here
                </a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
